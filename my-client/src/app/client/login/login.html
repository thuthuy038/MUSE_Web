<div class="container login-container">
    <div class="row g-0">
        <div class="col-md-5 d-flex justify-content-center align-items-center">
            <div class="login-title-wrapper">
                <h1 class="login-title">LOGIN</h1>
            </div>
        </div>

        <div class="col-md-7 login-form-wrapper">
            <div class="login-form">
                <form (ngSubmit)="onSubmit()">
                    <div class="mb-4">
                        <input type="text" class="form-control" placeholder="Nhập email hoặc số điện thoại"
                            [(ngModel)]="email" name="email" required>
                    </div>
                    <div class="mb-4 position-relative">
                        <input [type]="showPassword ? 'text' : 'password'" 
                               class="form-control" 
                               placeholder="Nhập mật khẩu" 
                               [(ngModel)]="password"
                               name="password" 
                               required>
                        <i class="bi position-absolute end-0 top-50 translate-middle-y me-3" 
                           [ngClass]="showPassword ? 'bi-eye' : 'bi-eye-slash'"
                           style="cursor: pointer; z-index: 10;"
                           (click)="togglePasswordVisibility()"></i>
                    </div>
                    <div class="d-flex justify-content-center gap-3 mb-3">
                        <button type="submit" class="btn btn-login">ĐĂNG NHẬP</button>
                        <button type="button" class="btn btn-register" (click)="goToSignup()">ĐĂNG KÝ</button>
                    </div>
                </form>
                <div class="text-center">
                    <a routerLink="/resetpassword" class="forgot-password">Quên mật khẩu?</a>
                </div>
                <div class="social-login-divider my-4">
                    <span>Hoặc đăng nhập với</span>
                </div>
                <div class="text-center">
                    <a [href]="'http://localhost:3000/api/auth/google'" class="btn btn-social btn-google">
                        <i class="bi bi-google me-2"></i> Google
                    </a>
                </div>

                <div class="text-center mt-4">
                    <button type="button" class="btn btn-admin" (click)="goToAdminLogin()">ADMIN</button>
                </div>
            </div>
        </div>
    </div>
</div>
