<div class="container-fluid py-4">
  <div class="account-wrapper mx-auto" style="max-width: 850px;">
    
    <form (ngSubmit)="saveProfile()">
      <!-- Thông tin tài khoản -->
      <div class="card shadow-sm custom-card mb-4">
        <div class="card-body p-4">
          <h5 class="section-title mb-0">Thông tin tài khoản</h5>
          <hr class="my-3 opacity-10">
          
          <div class="row align-items-center">
            <div class="col-md-8 order-2 order-md-1">
              <div class="mb-3">
                <label class="form-label fw-bold">Tên</label>
                <input type="text" class="form-control custom-input" 
                       [(ngModel)]="firstName" name="firstName">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Họ</label>
                <input type="text" class="form-control custom-input" 
                       [(ngModel)]="lastName" name="lastName">
              </div>
            </div>

            <div class="col-md-4 order-1 order-md-2 text-center mb-4 mb-md-0">
              <div class="position-relative d-inline-block">
                <img [src]="avatarUrl" class="rounded-circle avatar-img" alt="Avatar">
                <input #avatarInput type="file" accept="image/*" hidden (change)="onFileSelected($event)">
                <button type="button" class="btn btn-primary btn-add-avatar" (click)="avatarInput.click()">+</button>
              </div>
              <div class="mt-2">
                <button type="button" class="btn btn-link text-decoration-none fw-bold btn-pink-text p-0" 
                        (click)="removeAvatar()">Loại bỏ ảnh</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Thông tin đăng nhập -->
      <div class="card shadow-sm custom-card">
        <div class="card-body p-4">
          <h5 class="section-title mb-0">Thông tin đăng nhập</h5>
          <hr class="my-3 opacity-10">
          
          <div class="row">
            <div class="col-md-8">
              <div class="mb-3">
                <label class="form-label fw-bold">Email tài khoản</label>
                <input type="email" class="form-control custom-input" 
                       [(ngModel)]="email" name="email">
              </div>
              <div class="password-container">
                <div class="password-field">
                  <label class="form-label fw-bold">Mật khẩu</label>
                  <input type="password" class="form-control custom-input" 
                         value="********" disabled>
                </div>
                <a routerLink="/admin/reset" class="btn-pink-text password-link">
                  Khôi phục mật khẩu
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Nút Lưu thay đổi và Đăng xuất -->
      <div class="d-flex justify-content-end gap-3 mt-3">
        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
        <button type="button" class="btn btn-outline-danger" (click)="logout()">Đăng xuất</button>
      </div>
    </form>

  </div>
</div>
