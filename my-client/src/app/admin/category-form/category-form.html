<form *ngIf="form" [formGroup]="form">

    <div class="container-fluid">

        <div class="row">

            <!-- LEFT -->
            <div class="col-md-8">

                <div class="card p-3">

                    <h5>Nội dung</h5>

                    <label>Mã danh mục</label>
                    <input class="form-control" formControlName="code">
                    <small class="text-success">↓ Nhập Code</small>

                    <label class="mt-3">Tên</label>
                    <input class="form-control" formControlName="name">
                    <small class="text-success">↓ Nhập tên</small>

                    <label class="mt-3">URL</label>
                    <input class="form-control" formControlName="url">
                    <small class="text-success">↓ Có thể bỏ trống</small>

                    <label class="mt-3">Liên kết ngoài</label>
                    <input class="form-control" formControlName="externalLink">
                    <small class="text-success">↓ Mặc định bỏ trống</small>

                    <label class="mt-3">Mô tả danh mục</label>
                    <textarea class="form-control" rows="5" formControlName="description"></textarea>

                </div>

            </div>


            <!-- RIGHT -->
            <div class="col-md-4">

                <div class="card p-3">

                    <h6>Thông tin thêm</h6>

                    <!-- Image -->
                    <label>Chọn ảnh</label>
                    <div class="image-list">

                        <div class="image-item" *ngFor="let img of banner">

                            <img [src]="'http://localhost:3000' + img.url" (click)="openPreview(img.url)">

                            <!-- nút xóa -->
                            <div class="delete-btn" (click)="deleteBanner(img, $event)">
                                ×
                            </div>

                        </div>

                        <div class="image-add" (click)="fileInput.click()">
                            +
                        </div>

                    </div>

                    <input type="file" #fileInput hidden multiple (change)="uploadBanner($event)">

                    <!-- popup xem ảnh -->
                    <div class="image-preview" *ngIf="previewImage" (click)="closePreview()">

                        <img [src]="'http://localhost:3000' + previewImage">

                    </div>

                    <label>Ngày tạo</label>
                    <input type="date" class="form-control" formControlName="createdAt">

                    <label class="mt-3">Trạng thái</label>
                    <select class="form-control" formControlName="status">

                        <option value="active">Đang hiển thị trên web</option>
                        <option value="inactive">Bị vô hiệu hóa</option>
                        <option value="featured">Hiển thị nổi bật</option>

                    </select>

                    <label class="mt-3">Loại</label>
                    <select class="form-control" formControlName="type">

                        <option value="category">Danh mục</option>
                        <option value="collection">Bộ sưu tập</option>

                    </select>

                </div>

            </div>

        </div>

        <div class="mt-3">
            <button type="button" class="btn btn-save" (click)="save()">
                Lưu danh mục
            </button>
            <button class="btn btn-cancel ms-2" type="button" (click)="cancel()">
                Hủy
            </button>
        </div>

    </div>

</form>
