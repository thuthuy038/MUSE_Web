<div class="container-fluid user-form">
  <form [formGroup]="form">
    <div class="row">
      <!-- LEFT -->
      <div class="col-md-8">
        <div class="card p-3">
          <h6 class="fw-bold mb-3">Nội dung</h6>

          <!-- code -->
          <div class="mb-3">
            <label>Mã người dùng:</label>
            <input class="form-control" formControlName="code">
          </div>

          <!-- name -->
          <div class="mb-3">
            <label>Họ và Tên:</label>
            <input class="form-control" formControlName="name">
          </div>

          <!-- gender birthday -->
          <div class="row mb-3">
            <div class="col-md-4">
              <label>Giới tính</label>
              <div class="gender-group">
                <button type="button" class="btn gender-btn" [ngClass]="{'active': form.value.gender === 'male'}"
                  (click)="form.patchValue({gender:'male'})">Nam</button>
                <button type="button" class="btn gender-btn" [ngClass]="{'active': form.value.gender === 'female'}"
                  (click)="form.patchValue({gender:'female'})">Nữ</button>
                <button type="button" class="btn gender-btn" [ngClass]="{'active': form.value.gender === 'other'}"
                  (click)="form.patchValue({gender:'other'})">Khác</button>
              </div>
            </div>
            <div class="col-md-5">
              <label>Ngày sinh</label>
              <input type="date" class="form-control" formControlName="birthday" (change)="calculateAge()">
            </div>
            <div class="col-md-3">
              <label>Tuổi</label>
              <input class="form-control" formControlName="age" readonly>
            </div>
          </div>

          <!-- email -->
          <div class="mb-3">
            <label>Email</label>
            <input class="form-control" formControlName="email">
          </div>

          <!-- phone -->
          <div class="mb-3">
            <label>Số điện thoại</label>
            <input class="form-control" formControlName="phone">
          </div>

          <!-- address (chính) -->
          <div class="mb-3">
            <label>Địa chỉ chính</label>
            <input class="form-control" formControlName="address">
          </div>

          <!-- Địa chỉ giao hàng (dùng addresses) -->
          <div class="mb-3">
            <label>Địa chỉ giao hàng</label>
            <div formArrayName="addresses">
              <div *ngFor="let address of addresses.controls; let i = index" class="d-flex mb-2 align-items-center">
                <div class="flex-grow-1 me-2">
                  <div class="p-2 border rounded">
                    <p class="mb-1 fw-bold">{{ address.value.fullName }} - {{ address.value.phone }}</p>
                    <p class="mb-1">{{ getAddressDisplay(address.value) }}</p>
                    <p class="mb-0 text-muted small">
                      Loại: {{ address.value.type === 'nha_rieng' ? 'Nhà riêng' : 'Văn phòng' }}
                      <span *ngIf="address.value.isDefault" class="badge bg-primary ms-2">Mặc định</span>
                    </p>
                  </div>
                </div>
                <button type="button" class="btn btn-danger" (click)="removeAddress(i)">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>

            <!-- Nút thêm địa chỉ mới -->
            <button type="button" class="btn btn-add" (click)="toggleAddressForm()">
              <i class="bi bi-plus-lg"></i> Thêm địa chỉ giao hàng
            </button>

            <!-- Form thêm địa chỉ -->
            <div *ngIf="showAddressForm" class="address-form mt-3 p-3 border rounded">
              <h6 class="fw-bold">Nhập địa chỉ mới</h6>
              
              <div class="mb-2">
                <input type="text" class="form-control" placeholder="Họ và tên" [(ngModel)]="fullName" [ngModelOptions]="{standalone: true}">
              </div>
              <div class="mb-2">
                <input type="text" class="form-control" placeholder="Số điện thoại" [(ngModel)]="phone" [ngModelOptions]="{standalone: true}">
              </div>
              <div class="mb-2">
                <select class="form-select" [(ngModel)]="selectedProvince" (change)="onProvinceChange()" [ngModelOptions]="{standalone: true}">
                  <option [ngValue]="null" disabled selected>-- Chọn Tỉnh / Thành phố --</option>
                  <option *ngFor="let p of provinces" [ngValue]="p">{{ p.name }}</option>
                </select>
              </div>
              <div class="mb-2">
                <select class="form-select" [(ngModel)]="selectedDistrict" (change)="onDistrictChange()" [disabled]="!selectedProvince" [ngModelOptions]="{standalone: true}">
                  <option [ngValue]="null" disabled selected>-- Chọn Quận / Huyện --</option>
                  <option *ngFor="let d of districts" [ngValue]="d">{{ d.name }}</option>
                </select>
              </div>
              <div class="mb-2">
                <select class="form-select" [(ngModel)]="selectedWard" [disabled]="!selectedDistrict" [ngModelOptions]="{standalone: true}">
                  <option [ngValue]="null" disabled selected>-- Chọn Phường / Xã --</option>
                  <option *ngFor="let w of wards" [ngValue]="w">{{ w.name }}</option>
                </select>
              </div>
              <div class="mb-2">
                <input type="text" class="form-control" placeholder="Số nhà, tên đường" [(ngModel)]="street" [ngModelOptions]="{standalone: true}">
              </div>
              <div class="mb-2">
                <label class="me-3">Loại địa chỉ:</label>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" [(ngModel)]="addressType" value="nha_rieng" [ngModelOptions]="{standalone: true}">
                  <label class="form-check-label">Nhà riêng</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" [(ngModel)]="addressType" value="van_phong" [ngModelOptions]="{standalone: true}">
                  <label class="form-check-label">Văn phòng</label>
                </div>
              </div>
              <div class="mb-2">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" [(ngModel)]="isDefault" [ngModelOptions]="{standalone: true}">
                  <label class="form-check-label">Đặt làm địa chỉ mặc định</label>
                </div>
              </div>
              <div class="d-flex gap-2">
                <button type="button" class="btn btn-primary" (click)="addAddressFromForm()">Thêm</button>
                <button type="button" class="btn btn-secondary" (click)="cancelAddressForm()">Hủy</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="col-md-4">
        <div class="card p-3">
          <h6 class="fw-bold mb-3">Thông tin thêm</h6>
          <!-- avatar -->
          <div class="avatar-box text-center">
            <div class="avatar-wrapper" *ngIf="avatarPreview">
              <img [src]="avatarPreview" class="avatar-preview" (click)="openPreview()">
              <div class="delete-avatar" (click)="removeAvatar()">
                <i class="bi bi-x-lg"></i>
              </div>
            </div>
            <div *ngIf="!avatarPreview" (click)="fileInput.click()">
              <i class="bi bi-image fs-1"></i>
              <p class="text-danger">Chọn ảnh đại diện</p>
            </div>
            <input type="file" hidden #fileInput (change)="onAvatarChange($event)">
          </div>

          <!-- popup preview -->
          <div class="image-modal" *ngIf="showPreview" (click)="closePreview()">
            <img [src]="avatarPreview" class="modal-image">
          </div>

          <!-- created date -->
          <div class="mt-3">
            <label>Ngày tạo</label>
            <input class="form-control" type="date" formControlName="createdAt" readonly>
          </div>

          <!-- status -->
          <div class="mt-3">
            <label>Trạng thái</label>
            <select class="form-select" formControlName="status">
              <option value="active">Hiển thị</option>
              <option value="inactive">Ẩn</option>
            </select>
          </div>

          <!-- role -->
          <div class="mt-3">
            <label>Role</label>
            <select class="form-select" formControlName="role">
              <option value="customer">Customer</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- BUTTON -->
    <div class="mt-3">
      <button class="btn btn-save" type="button" (click)="save()">Lưu</button>
      <button class="btn btn-cancel ms-2" type="button" (click)="cancel()">Hủy</button>
    </div>
  </form>
</div>
