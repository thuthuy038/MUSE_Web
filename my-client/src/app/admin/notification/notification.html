<div class="notification-container">
    <button class="notification-btn" (click)="toggleDropdown()">
        <i class="bi bi-bell"></i>
        <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
    </button>

    <div class="notification-dropdown" [class.show]="showDropdown">
        <div class="dropdown-header">
            <h6>Thông báo</h6>
            <button *ngIf="unreadCount > 0" class="btn-read-all" (click)="markAllAsRead()">
                Đánh dấu đã đọc
            </button>
        </div>

        <div class="dropdown-body" *ngIf="notifications.length > 0; else emptyState">
            <div *ngFor="let noti of notifications" class="notification-item" [class.unread]="noti.status === 'unread'"
                (click)="navigateToTarget(noti)">
                <div class="notification-icon" [style.background]="getColorByType(noti.type)">
                    <i class="bi" [ngClass]="getIconByType(noti.type)"></i>
                </div>
                <div class="notification-content">
                    <div class="notification-title">{{ noti.title }}</div>
                    <div class="notification-message">{{ noti.message }}</div>
                    <div class="notification-time">{{ getTimeAgo(noti.createdAt) }}</div>
                </div>
                <button class="notification-delete" (click)="deleteNotification(noti._id, $event)">
                    <i class="bi bi-x"></i>
                </button>
            </div>
        </div>

        <ng-template #emptyState>
            <div class="empty-state">
                <i class="bi bi-bell-slash"></i>
                <p>Không có thông báo mới</p>
            </div>
        </ng-template>

        <div class="dropdown-footer" *ngIf="notifications.length > 0">
            <a routerLink="/admin/notifications" class="view-all">Xem tất cả thông báo</a>
        </div>
    </div>
</div>
