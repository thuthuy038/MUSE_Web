<form *ngIf="form" [formGroup]="form">
    <div class="container-fluid">
        <div class="row">
            <!-- LEFT -->
            <div class="col-md-8">
                <div class="card p-3">
                    <h5>Nội dung</h5>
                    <label>Danh mục</label>
                    <select class="form-control" formControlName="category">
                        <option value="">Chọn danh mục sản phẩm</option>
                        <option *ngFor="let c of categories" [value]="c._id">
                            {{c.name}}
                        </option>
                    </select>
                    <small class="text-success">↓ Click chọn danh mục trong danh sách trên</small>

                    <label>Bộ sưu tập</label>
                    <select class="form-control" formControlName="category">
                        <option value="">Chọn bộ sưu tập</option>
                    </select>
                    <small class="text-success">↓ Click chọn bộ sưu tập trong danh sách trên</small>

                    <label>Tên</label>
                    <input class="form-control" formControlName="name">
                    <small class="text-success">↓ Nhập tên</small>

                    <label>URL</label>
                    <input class="form-control">
                    <small class="text-success">↓ Có thể bỏ trống</small>

                    <div class="row">
                        <div class="col-md-6">

                            <label>Giá gốc</label>
                            <input class="form-control" formControlName="price">

                        </div>
                        <div class="col-md-6">

                            <label>Giảm giá (%)</label>
                            <input class="form-control" formControlName="discountPercent">

                        </div>
                    </div>

                    <label>Kích thước - Màu sắc - Số lượng</label>

                    <label>Kích thước</label>
                    <div class="d-flex mb-2">
                        <input class="form-control me-2" [(ngModel)]="newSize" name="newSize"
                            [ngModelOptions]="{standalone: true}" placeholder="Nhập size (S, M...)">
                        <button class="btn btn-primary" type="button" (click)="addSize()">Thêm</button>
                    </div>

                    <div class="mb-2">
                        <span class="badge bg-secondary me-1" *ngFor="let s of sizes">
                            {{s}} <span (click)="removeSize(s)" style="cursor:pointer">×</span>
                        </span>
                    </div>

                    <label>Màu sắc</label>
                    <div class="d-flex mb-2">
                        <input class="form-control me-2" [(ngModel)]="newColor" name="newColor"
                            [ngModelOptions]="{standalone: true}" placeholder="Nhập màu (Đỏ, Xanh...)">
                        <button class="btn btn-primary" type="button" (click)="addColor()">Thêm</button>
                    </div>

                    <div class="mb-3">
                        <span class="badge bg-info me-1" *ngFor="let c of colors">
                            {{c}} <span (click)="removeColor(c)" style="cursor:pointer">×</span>
                        </span>
                    </div>

                    <!-- TABLE -->
                    <table class="table table-bordered text-center" *ngIf="sizes.length && colors.length">
                        <thead>
                            <tr>
                                <th>Màu \ Size</th>
                                <th *ngFor="let s of sizes">{{s}}</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let c of colors">
                                <td>{{c}}</td>
                                <td *ngFor="let s of sizes">
                                    <input type="number" class="form-control" [(ngModel)]="matrix[c][s]"
                                        name="matrix_{{c}}_{{s}}" [ngModelOptions]="{standalone: true}"
                                        (input)="updateStock()">
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="row">
                        <div class="col-md-6">

                            <label>Mã sản phẩm</label>
                            <input class="form-control" formControlName="code">

                        </div>

                        <div class="col-md-6">

                            <label>Tồn kho</label>
                            <input class="form-control" formControlName="stock">

                        </div>

                    </div>

                    <!-- Mô tả sản phẩm -->
                    <label class="mt-3">Mô tả sản phẩm</label>
                    <div class="editor-wrapper">
                        <quill-editor formControlName="description" [modules]="quillConfig"
                            placeholder="Nhập mô tả sản phẩm...">
                        </quill-editor>
                    </div>
                    <small class="text-success mt-1">
                        💡 Hỗ trợ định dạng:
                        <strong>in đậm</strong>,
                        <em>in nghiêng</em>,
                        <u>gạch chân</u>,
                        danh sách,
                        chèn link,
                        chèn ảnh,
                        video...
                    </small>

                </div>

            </div>
            <!-- RIGHT -->
            <div class="col-md-4">
                <div class="card p-3">
                    <h6>Thông tin thêm</h6>
                    <label>Chọn ảnh</label>
                    <div class="image-list">

                        <div class="image-item" *ngFor="let img of images">

                            <img [src]="'http://localhost:3000' + img.url" (click)="openPreview(img.url)">

                            <!-- nút xóa -->
                            <div class="delete-btn" (click)="deleteImage(img, $event)">
                                ×
                            </div>

                        </div>

                        <div class="image-add" (click)="fileInput.click()">
                            +
                        </div>

                    </div>

                    <input type="file" #fileInput hidden multiple (change)="uploadImages($event)">

                    <!-- popup xem ảnh -->
                    <div class="image-preview" *ngIf="previewImage" (click)="closePreview()">

                        <img [src]="'http://localhost:3000' + previewImage">

                    </div>


                    <label>Ngày đăng:</label>
                    <input type="date" class="form-control" formControlName="createdAt">
                    <label>Trạng thái</label>

                    <select class="form-control" formControlName="status">

                        <option value="active">
                            Hiển thị
                        </option>

                        <option value="featured">
                            Sản phẩm nổi bật
                        </option>

                        <option value="disabled">
                            Ẩn khỏi website
                        </option>

                    </select>

                    <label>Mới</label>
                    <select class="form-control" formControlName="isNew">
                        <option [value]="false">Không</option>
                        <option [value]="true">Có</option>
                    </select>

                    <label>Bán chạy</label>
                    <select class="form-control" formControlName="isBestSeller">
                        <option [value]="false">Không</option>
                        <option [value]="true">Có</option>
                    </select>

                </div>
            </div>
        </div>

        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-save" type="button" (click)="save()">
                Lưu sản phẩm
            </button>

            <button class="btn btn-cancel ms-2" type="button" (click)="cancel()">
                Hủy
            </button>
        </div>
    </div>
</form>
