<main class="reset-container">
  <div class="left-panel">
    <h1>RESET <span class="bold-underline">PASSWORD</span></h1>
  </div>
  <div class="right-panel">
    <div class="form-step" [class.active]="step === 1">
      <div class="form-group">
        <input type="text" placeholder="Nhập email hoặc số điện thoại" [(ngModel)]="emailOrPhone" />
      </div>
      <button class="btn" (click)="handleStep1()">XÁC NHẬN</button>
    </div>
    <div class="form-step" [class.active]="step === 2">
      <div class="form-group">
        <input type="text" placeholder="Nhập mã OTP" [(ngModel)]="otp" />
      </div>
      <button class="btn" (click)="handleStep2()">XÁC NHẬN</button>
    </div>
    <div class="form-step" [class.active]="step === 3">
      <div class="form-group">
        <input type="password" placeholder="Nhập mật khẩu mới" [(ngModel)]="newPassword" />
      </div>
      <div class="form-group">
        <input type="password" placeholder="Xác nhận mật khẩu" [(ngModel)]="confirmPassword" />
      </div>
      <button class="btn" (click)="handleStep3()">XÁC NHẬN</button>
    </div>
  </div>
</main>
