<div class="filter-wrap">
  <div class="filter-card">
    <!-- header -->
    <div class="header-row">
      <div class="title">Bộ lọc</div>
      <div class="icon"><i class="bi bi-sliders"></i></div>
    </div>

    <!-- Danh mục -->
    <div class="section">
      <div class="section-title">
        <span>Danh mục</span>
        <i class="bi bi-chevron-down small-icon"></i>
      </div>

      <div class="category-list">
        <!-- TẤT CẢ -->
        <div class="form-check">
          <input class="form-check-input" type="checkbox" [checked]="selectedCategories['all'] || false"
            (change)="onCategoryChange('all', $event)" />
          <label class="form-check-label">Tất cả sản phẩm</label>
        </div>

        <!-- CATEGORY LIST -->
        <div *ngFor="let c of categories" class="form-check">
          <input class="form-check-input" type="checkbox" [checked]="selectedCategories[c._id] || false"
            (change)="onCategoryChange(c._id, $event)" />
          <label class="form-check-label">{{ c.name }}</label>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Giá -->
      <div class="section">
        <div class="section-title">
          <span>Khoảng giá</span>
          <i class="bi bi-chevron-down small-icon"></i>
        </div>

        <div class="d-flex align-items-center gap-2 mb-3">
          <input type="number" class="form-control" placeholder="đ Từ" [(ngModel)]="minPrice">
          <span> - </span>
          <input type="number" class="form-control" placeholder="đ Đến" [(ngModel)]="maxPrice">
        </div>
      </div>

      <div class="divider"></div>

      <!-- Kích cỡ -->
      <div class="section">
        <div class="section-title">
          <span>Kích cỡ</span>
          <i class="bi bi-chevron-down small-icon"></i>
        </div>

        <div class="sizes">
          <button *ngFor="let s of sizes" class="size-pill" [class.active]="selectedSize === s" (click)="selectSize(s)">
            {{ s }}
          </button>
        </div>
      </div>

      <div class="divider"></div>

<!-- Rating -->
<div class="section">
  <div class="section-title">
    <span>Đánh giá</span>
    <i class="bi bi-chevron-down small-icon"></i>
  </div>

  <div class="sizes">
    <button class="size-pill"
      [class.active]="selectedRating === 5"
      (click)="selectRating(5)">
      ⭐ 5 sao
    </button>

    <button class="size-pill"
      [class.active]="selectedRating === 4"
      (click)="selectRating(4)">
      ⭐ từ 4 sao
    </button>

    <button class="size-pill"
      [class.active]="selectedRating === 3"
      (click)="selectRating(3)">
      ⭐ từ 3 sao
    </button>

    <button class="size-pill"
      [class.active]="selectedRating === 2"
      (click)="selectRating(2)">
      ⭐ từ 2 sao
    </button>

    <button class="size-pill"
      [class.active]="selectedRating === 1"
      (click)="selectRating(1)">
      ⭐ từ 1 sao
    </button>
  </div>
</div>

      <!-- action buttons -->
      <div class="actions">
        <button class="btn reset" (click)="resetFiltersFn()">Đặt lại</button>
        <button class="btn apply" (click)="applyFiltersFn()">Áp dụng</button>
      </div>
    </div>
  </div>
