<div class="reset-wrapper">

  <div class="reset-card">
    <h2>Khôi phục mật khẩu</h2>

    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="Email" [(ngModel)]="email" name="email">
    </div>

    <div class="form-group">
      <label>Mật khẩu mới</label>
      <div class="password-field">
        <input [type]="showPassword ? 'text' : 'password'" placeholder="Mật khẩu" [(ngModel)]="password" name="password">
        <i class="bi" [ngClass]="showPassword ? 'bi-eye' : 'bi-eye-slash'" (click)="togglePasswordVisibility()"></i>
      </div>
    </div>

    <div class="form-group">
      <label>Nhập lại mật khẩu</label>
      <div class="password-field">
        <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Nhập lại mật khẩu" [(ngModel)]="confirmPassword" name="confirmPassword">
        <i class="bi" [ngClass]="showConfirmPassword ? 'bi-eye' : 'bi-eye-slash'" (click)="toggleConfirmPasswordVisibility()"></i>
      </div>
    </div>

    <div class="form-group">
      <label>Security Code</label>
      <div class="password-field">
        <input type="text" placeholder="Nhập mã nội bộ" [(ngModel)]="securityCode" name="securityCode">
        <i class="bi bi-lock"></i>
      </div>
    </div>

    <div class="divider"></div>

    <button class="reset-btn" (click)="onSubmit()">Lấy mật khẩu</button>

    <div class="back-link">
      <a (click)="goBack()">Trở về đăng nhập</a>
    </div>

  </div>

</div>
