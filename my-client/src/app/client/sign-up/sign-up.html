<div class="container signup-container">
    <div class="row g-0">
        <div class="col-md-5 d-flex justify-content-center align-items-center">
            <div class="signup-title-wrapper">
                <h1 class="signup-title">SIGN UP</h1>
            </div>
        </div>

        <div class="col-md-7 signup-form-wrapper">
            <div class="signup-form">
                <form (ngSubmit)="onSubmit()">
                    <div class="row mb-3">
                        <div class="col">
                            <input type="text" class="form-control" placeholder="Họ" [(ngModel)]="user.firstName"
                                name="firstName" required>
                        </div>
                        <div class="col">
                            <input type="text" class="form-control" placeholder="Tên" [(ngModel)]="user.lastName"
                                name="lastName" required>
                        </div>
                    </div>
                    <div class="mb-4 d-flex gap-4">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="male"
                                [(ngModel)]="user.gender">
                            <label class="form-check-label" for="male">Nam</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="female"
                                [(ngModel)]="user.gender">
                            <label class="form-check-label" for="female">Nữ</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <input type="text" class="form-control" placeholder="Nhập email hoặc số điện thoại"
                            [(ngModel)]="user.emailOrPhone" name="emailOrPhone" required>
                    </div>
                    <div>
                        <input type="password" class="form-control" placeholder="Nhập mật khẩu"
                            [(ngModel)]="user.password" name="password" required>
                    </div>
                    <div class="mb-4">
                        <input type="password" class="form-control" placeholder="Nhập lại mật khẩu"
                            [(ngModel)]="confirmPassword" name="confirmPassword" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4">
                        <a routerLink="/login" class="back-arrow">
                            <i class="fas fa-arrow-left"></i>
                        </a>
                        <button type="submit" class="btn btn-signup">ĐĂNG KÝ</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
